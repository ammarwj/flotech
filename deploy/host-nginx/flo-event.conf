# ============================================================
# flo-event — HOST nginx reverse proxy vhost
# Place on the VPS at /etc/nginx/sites-available/flo-event.conf and symlink into
# sites-enabled/ (or drop into /etc/nginx/conf.d/). This runs on the HOST nginx
# that already fronts the runup stack — NOT inside Docker.
#
#   flo-event.flotech.id      -> 127.0.0.1:3001  (flo-event web, Next.js)
#   api-flo-event.flotech.id  -> 127.0.0.1:8001  (flo-event api, Laravel)
#
# Install as plain HTTP (below), then let certbot add TLS + the 80->443 redirect:
#   sudo certbot --nginx -d flo-event.flotech.id -d api-flo-event.flotech.id
# certbot rewrites these blocks in place (adds listen 443 ssl + cert paths).
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name flo-event.flotech.id;

    # Uploads (images, proof of payment). Host default is 1m — must match the app.
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api-flo-event.flotech.id;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
