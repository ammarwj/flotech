# ============================================================
# flo-event — development override (hot reload + bind mounts)
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up api db redis
# Backend runs in Docker (api on :8000, db, redis); the Next.js web app runs
# on the host for speed: `cd web && bun run dev` (Turbopack, http://localhost:3000).
# ============================================================

services:
  api:
    build:
      context: ./api
    command: sh -c "composer install && php artisan serve --host=0.0.0.0 --port=8000"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_HOST=db
      - REDIS_HOST=redis
    volumes:
      - ./api:/var/www/html
      - api_vendor:/var/www/html/vendor
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./api
    command: php artisan horizon
    environment:
      - APP_ENV=local
      - DB_HOST=db
      - REDIS_HOST=redis
    volumes:
      - ./api:/var/www/html
      - api_vendor:/var/www/html/vendor

  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

volumes:
  api_vendor:
