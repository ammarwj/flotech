# ============================================================
# flo-event — Nginx reverse proxy
#   flo-event.id      -> web (Next.js, :3000)
#   api.flo-event.id  -> api (Laravel, :8000)
# Replace the server_name values with your real domains.
# HTTPS blocks require certs from certbot (run ./init-letsencrypt.sh first).
# ============================================================

# ---- ACME challenge + HTTP->HTTPS redirect ----
server {
    listen 80;
    listen [::]:80;
    server_name flo-event.id www.flo-event.id api.flo-event.id;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- Frontend (Next.js) ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name flo-event.id www.flo-event.id;

    ssl_certificate     /etc/letsencrypt/live/flo-event.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flo-event.id/privkey.pem;

    client_max_body_size 25m;

    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---- Backend (Laravel API) ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.flo-event.id;

    ssl_certificate     /etc/letsencrypt/live/flo-event.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flo-event.id/privkey.pem;

    client_max_body_size 25m;

    location / {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
